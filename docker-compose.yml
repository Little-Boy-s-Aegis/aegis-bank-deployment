services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    # I-01 fix: No host port binding. Postgres is only accessible within the Docker network.
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-local=scram-sha-256 --auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aegis-network

  # ============================================
  # Redis (Threshold State Management ONLY)
  # NOT used as message broker — Kafka is the sole broker
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aegis-network

  # ============================================
  # Qdrant Vector Database
  # ============================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aegis-qdrant
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aegis-network

  # ============================================
  # Vector DB One-shot Bootstrap
  # ============================================
  vector-db-init:
    image: voduchieu1/aegis-soar-engine:latest
    build:
      context: ../soar-engine
      dockerfile: Dockerfile
    container_name: aegis-vector-db-init
    entrypoint: ["python", "ingest_to_vector_db.py"]
    environment:
      QDRANT_URL: http://qdrant:6333
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      AGENT_L1_DIR: /agent-layer-1
      AGENT_L2_DIR: /app/agent-layer-2
    volumes:
      - ../agent-layer-1:/agent-layer-1:ro
      - ../agent-layer-2:/app/agent-layer-2:ro
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"
    networks:
      - aegis-network

  # ============================================
  # Apache Kafka KRaft HA Cluster (3-Node)
  # Combined broker+controller mode
  # Tolerates 1 node failure
  # ============================================
  kafka-1:
    image: apache/kafka:3.9.0
    container_name: aegis-kafka-1
    hostname: kafka-1
    expose:
      - "29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-AegisKafkaCluster001xyzw}
    volumes:
      - kafka_data_1:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aegis-network

  kafka-2:
    image: apache/kafka:3.9.0
    container_name: aegis-kafka-2
    hostname: kafka-2
    expose:
      - "29092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-AegisKafkaCluster001xyzw}
    volumes:
      - kafka_data_2:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aegis-network

  kafka-3:
    image: apache/kafka:3.9.0
    container_name: aegis-kafka-3
    hostname: kafka-3
    expose:
      - "29092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-3:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-AegisKafkaCluster001xyzw}
    volumes:
      - kafka_data_3:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aegis-network

  # ============================================
  # Kafka UI (Kafdrop) - Message Visualization
  # ============================================
  kafka-ui:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: aegis-kafka-ui
    expose:
      - "9000"
    environment:
      KAFKA_BROKERCONNECT: kafka-1:29092,kafka-2:29092,kafka-3:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # Spring Boot Banking Backend (BE)
  # ============================================
  be-backend:
    image: voduchieu1/aegis-bank-backend:latest
    build:
      context: ../BE
      dockerfile: Dockerfile
    container_name: aegis-be-backend
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-aegis}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      AEGIS_SECURITY_SYNC_TOKEN: ${AEGIS_SECURITY_SYNC_TOKEN}
      LOGGING_FILE_NAME: /var/log/bank/application.log
    volumes:
      - shared_logs:/var/log/bank
    depends_on:
      postgres:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/api/admin/security/status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - aegis-network

  # ============================================
  # Next.js Web Portal Frontend (FE_Web)
  # ============================================
  fe-web:
    image: voduchieu1/aegis-bank-web-client:latest
    build:
      context: ../FE_Web
      dockerfile: Dockerfile
    container_name: aegis-fe-web
    expose:
      - "3000"
    depends_on:
      be-backend:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # Go SOC Backend (dashboard/backend)
  # ============================================
  dashboard-backend:
    image: voduchieu1/aegis-dashboard-backend:latest
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: aegis-dashboard-backend
    expose:
      - "8082"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aegis}?sslmode=disable
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      AEGIS_INTERNAL_TOKEN: ${AEGIS_SECURITY_SYNC_TOKEN}
      BANK_BACKEND_URL: http://be-backend:8080
      AEGIS_SIMULATION_ENABLED: ${AEGIS_SIMULATION_ENABLED:-false}
      AEGIS_COOKIE_SECURE: "false"
      AEGIS_ALLOW_PRIVATE_IP_BAN: "true"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8082 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 3s
    networks:
      - aegis-network

  # ============================================
  # SOC Dashboard React/Vite Frontend (dashboard/frontend)
  # ============================================
  dashboard-frontend:
    image: voduchieu1/aegis-dashboard-frontend:latest
    build:
      context: ../dashboard/frontend
      dockerfile: Dockerfile
    container_name: aegis-dashboard-frontend
    expose:
      - "3001"
    depends_on:
      dashboard-backend:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # Nginx API Gateway & Reverse Proxy (Entrypoint)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: aegis-nginx-gateway
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - shared_logs:/var/log/nginx
    depends_on:
      fe-web:
        condition: service_started
      be-backend:
        condition: service_healthy
      dashboard-backend:
        condition: service_healthy
      dashboard-frontend:
        condition: service_started
      kafka-ui:
        condition: service_started
    networks:
      - aegis-network

  # ============================================
  # Fluent Bit Log Aggregator
  # ============================================
  fluent-bit:
    image: fluent/fluent-bit:3.0
    container_name: aegis-fluent-bit
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
    expose:
      - "2020"
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./fluent-bit/filter_threats.lua:/fluent-bit/etc/filter_threats.lua:ro
      - shared_logs:/var/log/shared
      - fluentbit_state:/var/lib/fluent-bit
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/fluent-bit/bin/fluent-bit", "--version"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - aegis-network

  # ============================================
  # Python Log Parser (L1 Pipeline)
  # ============================================
  log-parser:
    image: voduchieu1/aegis-log-parser:latest
    build:
      context: ./log-parser
      dockerfile: Dockerfile
    container_name: aegis-log-parser
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-aegis-raw-logs-compliance}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      LOCAL_RAW_LOG_DIR: /app/raw-logs
      # Redis for threshold state management
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      # SOAR Fast-Path topic for obvious attacks
      SOAR_FAST_PATH_TOPIC: soar.actions.fast-path
      # LLM Security Agent
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_MODEL_NAME: ${QWEN_MODEL_NAME:-qwen3-plus}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./backups/raw-logs:/app/raw-logs
      - ../agent-layer-1:/app/agent-layer-1:ro
    depends_on:
      qdrant:
        condition: service_healthy
      vector-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - aegis-network

  # ============================================
  # ============================================
  # Aegis SOAR Orchestrator Microservice (Qwen 3.7 Plus Agent)
  # ============================================
  soar-orchestrator:
    image: voduchieu1/aegis-soar-engine:latest
    build:
      context: ../soar-engine
      dockerfile: Dockerfile
    container_name: aegis-soar-orchestrator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aegis}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_API_URL: http://dashboard-backend:8082/api
      AEGIS_INTERNAL_TOKEN: ${AEGIS_SECURITY_SYNC_TOKEN}
      # LLM Settings
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_MODEL_NAME: ${QWEN_MODEL_NAME:-qwen3-plus}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      # SOC autopilot configuration
      SOC_AUTOPILOT_ENABLED: "true"
      AEGIS_ALLOW_PRIVATE_IP_BAN: ${AEGIS_ALLOW_PRIVATE_IP_BAN:-true}
      FORTINET_BASE_URL: "http://aegis-staging-sandbox:8095/api/v2"
      # Offline L2 Prompt / Playbooks Directory
      AGENT_L2_DIR: /app/agent-layer-2
      # Vault Configuration
      VAULT_ENABLED: "true"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-aegis-vault-root-token}
      VAULT_SECRET_PATH: "secret/data/aegis/soar"
      # OPA Configuration
      OPA_ENABLED: "true"
      OPA_URL: "http://opa:8181"
      OPA_CALLER_ID: "soar-orchestrator"
      OPA_POLICY_REVISION: "aegis-autopilot-v1"
      OPA_ALLOW_CACHE_TTL_SECONDS: "30"
      # Asset Inventory Configuration
      ASSET_INVENTORY_API_URL: "http://asset-inventory:8083/api/v1/assets/critical"
      # HA Configuration
      HA_NODE_ROLE: "active"
      HA_HEALTH_CHECK_INTERVAL_MS: "5000"
      HA_LEADERSHIP_TTL_S: "15"
      # Notification Connectors
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-mock-telegram-token}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_SERVER_CHAT_ID: ${TELEGRAM_SERVER_CHAT_ID:-}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY:-mock-pagerduty-key}
      JIRA_URL: ${JIRA_URL:-https://jira.example.com}
      JIRA_USER: ${JIRA_USER:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-mock-jira-token}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-AEGIS}
      SMTP_HOST: ${SMTP_HOST:-mock-smtp-host}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-soc@aegis.bank}
      EMAIL_TO_SOC: ${EMAIL_TO_SOC:-soc-team@aegis.bank}
      MQTT_BROKER: ${MQTT_BROKER:-mock-mqtt-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-aegis/soc}
      WEBHOOK_URLS: ${WEBHOOK_URLS:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      # Threat Intelligence
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-mock-vt-api-key}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-mock-abuseipdb-key}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-mock-shodan-key}
      # Scheduler
      SCHEDULER_ENABLED: "true"
      DIGEST_INTERVAL_MINUTES: "15"
      # PRE-KILL Monitor
      PREKILL_ENABLED: "true"
      PREKILL_DEFAULT_TTL_MINUTES: "60"
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ../agent-layer-2:/app/agent-layer-2:ro
    depends_on:
      qdrant:
        condition: service_healthy
      vector-db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dashboard-backend:
        condition: service_started
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      opa:
        condition: service_started
    networks:
      - aegis-network

  # ============================================
  # Aegis SOAR Action Execution & Rate-Limiting Microservice (Message Queue Worker)
  # ============================================
  soar-action-worker:
    image: voduchieu1/aegis-soar-engine:latest
    build:
      context: ../soar-engine
      dockerfile: Dockerfile
    container_name: aegis-soar-action-worker
    command: ["python", "action_worker.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aegis}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_API_URL: http://dashboard-backend:8082/api
      AEGIS_INTERNAL_TOKEN: ${AEGIS_SECURITY_SYNC_TOKEN}
      AEGIS_ALLOW_PRIVATE_IP_BAN: ${AEGIS_ALLOW_PRIVATE_IP_BAN:-true}
      ACTION_EXECUTION_DELAY_SECONDS: "2.0"
      # Vault Configuration
      VAULT_ENABLED: "true"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-aegis-vault-root-token}
      VAULT_SECRET_PATH: "secret/data/aegis/soar"
      # OPA Configuration
      OPA_ENABLED: "true"
      OPA_URL: "http://opa:8181"
      OPA_CALLER_ID: "soar-action-worker"
      OPA_POLICY_REVISION: "aegis-autopilot-v1"
      OPA_ALLOW_CACHE_TTL_SECONDS: "30"
      # Asset Inventory Configuration
      ASSET_INVENTORY_API_URL: "http://asset-inventory:8083/api/v1/assets/critical"
      FORTINET_BASE_URL: "http://aegis-staging-sandbox:8095/api/v2"
      # PRE-KILL Monitor
      PREKILL_ENABLED: "true"
      PREKILL_DEFAULT_TTL_MINUTES: "60"
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      dashboard-backend:
        condition: service_started
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      opa:
        condition: service_started
    networks:
      - aegis-network

  # ============================================
  # Aegis SOAR Orchestrator STANDBY (HA Failover Node)
  # System Design: 2 Orchestrator Instances (1 Active, 1 Standby)
  # ============================================
  soar-orchestrator-standby:
    image: voduchieu1/aegis-soar-engine:latest
    build:
      context: ../soar-engine
      dockerfile: Dockerfile
    container_name: aegis-soar-orchestrator-standby
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aegis}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_API_URL: http://dashboard-backend:8082/api
      AEGIS_INTERNAL_TOKEN: ${AEGIS_SECURITY_SYNC_TOKEN}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_MODEL_NAME: ${QWEN_MODEL_NAME:-qwen3-plus}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      SOC_AUTOPILOT_ENABLED: "true"
      AEGIS_ALLOW_PRIVATE_IP_BAN: ${AEGIS_ALLOW_PRIVATE_IP_BAN:-true}
      FORTINET_BASE_URL: "http://aegis-staging-sandbox:8095/api/v2"
      AGENT_L2_DIR: /app/agent-layer-2
      VAULT_ENABLED: "true"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-aegis-vault-root-token}
      VAULT_SECRET_PATH: "secret/data/aegis/soar"
      OPA_ENABLED: "true"
      OPA_URL: "http://opa:8181"
      OPA_CALLER_ID: "soar-orchestrator"
      OPA_POLICY_REVISION: "aegis-autopilot-v1"
      OPA_ALLOW_CACHE_TTL_SECONDS: "30"
      ASSET_INVENTORY_API_URL: "http://asset-inventory:8083/api/v1/assets/critical"
      # HA Configuration — STANDBY role
      HA_NODE_ROLE: "standby"
      HA_HEALTH_CHECK_INTERVAL_MS: "5000"
      HA_LEADERSHIP_TTL_S: "15"
      # Notification (same config as active)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-mock-telegram-token}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY:-mock-pagerduty-key}
      JIRA_URL: ${JIRA_URL:-https://jira.example.com}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-mock-jira-token}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-AEGIS}
      SMTP_HOST: ${SMTP_HOST:-mock-smtp-host}
      EMAIL_FROM: ${EMAIL_FROM:-soc@aegis.bank}
      EMAIL_TO_SOC: ${EMAIL_TO_SOC:-soc-team@aegis.bank}
      # Threat Intel
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-mock-vt-api-key}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-mock-abuseipdb-key}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-mock-shodan-key}
      SCHEDULER_ENABLED: "false"
      PREKILL_ENABLED: "true"
      PREKILL_DEFAULT_TTL_MINUTES: "60"
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ../agent-layer-2:/app/agent-layer-2:ro
    depends_on:
      qdrant:
        condition: service_healthy
      vector-db-init:
        condition: service_completed_successfully
      soar-orchestrator:
        condition: service_started
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # Aegis SOAR Action Worker STANDBY (HA Failover)
  # ============================================
  soar-action-worker-standby:
    image: voduchieu1/aegis-soar-engine:latest
    build:
      context: ../soar-engine
      dockerfile: Dockerfile
    container_name: aegis-soar-action-worker-standby
    command: ["python", "action_worker.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aegis}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_API_URL: http://dashboard-backend:8082/api
      AEGIS_INTERNAL_TOKEN: ${AEGIS_SECURITY_SYNC_TOKEN}
      ACTION_EXECUTION_DELAY_SECONDS: "2.0"
      VAULT_ENABLED: "true"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-aegis-vault-root-token}
      VAULT_SECRET_PATH: "secret/data/aegis/soar"
      OPA_ENABLED: "true"
      OPA_URL: "http://opa:8181"
      OPA_CALLER_ID: "soar-action-worker"
      OPA_POLICY_REVISION: "aegis-autopilot-v1"
      OPA_ALLOW_CACHE_TTL_SECONDS: "30"
      ASSET_INVENTORY_API_URL: "http://asset-inventory:8083/api/v1/assets/critical"
      FORTINET_BASE_URL: "http://aegis-staging-sandbox:8095/api/v2"
      PREKILL_ENABLED: "true"
      PREKILL_DEFAULT_TTL_MINUTES: "60"
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
      soar-action-worker:
        condition: service_started
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # HashiCorp Vault (Secure Credential Storage)
  # ============================================
  vault:
    image: hashicorp/vault:1.15
    container_name: aegis-vault
    expose:
      - "8200"
    volumes:
      - ./vault/config:/vault/config:ro
      - vault_data:/vault/file
    command: server
    cap_add:
      - IPC_LOCK
    networks:
      - aegis-network

  # ============================================
  # Vault Secret Provisioner (One-shot)
  # ============================================
  vault-init:
    image: alpine:latest
    container_name: aegis-vault-init
    volumes:
      - ./vault/scripts:/vault/scripts:ro
      - vault_data:/vault/file
    environment:
      VAULT_ROOT_TOKEN: ${VAULT_ROOT_TOKEN:-aegis-vault-root-token}
      FORTINET_API_TOKEN: ${FORTINET_API_TOKEN:-aegis-fortinet-token-123456}
      CROWDSTRIKE_CLIENT_SECRET: ${CROWDSTRIKE_CLIENT_SECRET:-mock-crowdstrike-client-secret}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-mock-client-secret}
      AD_LDAP_PASSWORD: ${AD_LDAP_PASSWORD:-mock-ldap-password}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-mock-aws-secret}
    command: /bin/sh /vault/scripts/init-vault.sh
    depends_on:
      - vault
    networks:
      - aegis-network

  # ============================================
  # Open Policy Agent (OPA Safety Engine)
  # ============================================
  opa:
    image: openpolicyagent/opa:0.61.0-static
    container_name: aegis-opa
    expose:
      - "8181"
    environment:
      AEGIS_SECURITY_SYNC_TOKEN: ${AEGIS_SECURITY_SYNC_TOKEN}
    command:
      - "run"
      - "--server"
      - "--log-level=info"
      - "--authentication=token"
      - "--authorization=basic"
      - "/policies"
    volumes:
      - ./opa/policies:/policies:ro
    networks:
      - aegis-network

  # ============================================
  # Kafka Topic Provisioner (One-shot)
  # ============================================
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: aegis-kafka-init
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: [ "/bin/bash", "-c", "/scripts/init-kafka-topics.sh" ]
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # Staging Sandbox Simulator (Defensive API Mocks)
  # ============================================
  staging-sandbox:
    image: voduchieu1/aegis-staging-sandbox:latest
    build:
      context: ./staging-sandbox
      dockerfile: Dockerfile
    container_name: aegis-staging-sandbox
    ports:
      - "127.0.0.1:8095:8095"
    environment:
      - SANDBOX_PORT=8095
      - AEGIS_SECURITY_SYNC_TOKEN=${AEGIS_SECURITY_SYNC_TOKEN}
      - FORTINET_API_TOKEN=${FORTINET_API_TOKEN:-aegis-fortinet-token-123456}
      - CROWDSTRIKE_CLIENT_SECRET=${CROWDSTRIKE_CLIENT_SECRET:-mock-crowdstrike-client-secret}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET:-mock-client-secret}
    networks:
      aegis-network:
        aliases:
          - aegis-staging-sandbox
          - asset-inventory

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data_1:
    driver: local
  kafka_data_2:
    driver: local
  kafka_data_3:
    driver: local
  shared_logs:
  vault_data:
    driver: local
  qdrant_data:
    driver: local
  fluentbit_state:
    driver: local

networks:
  aegis-network:
    driver: bridge
