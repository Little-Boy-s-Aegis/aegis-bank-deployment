services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aegis-network

  # ============================================
  # Redis (Threshold State Management ONLY)
  # NOT used as message broker — Kafka is the sole broker
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aegis-network

  # ============================================
  # Apache Kafka KRaft HA Cluster (3-Node)
  # Combined broker+controller mode
  # Tolerates 1 node failure
  # ============================================
  kafka-1:
    image: apache/kafka:3.9.0
    container_name: aegis-kafka-1
    hostname: kafka-1
    ports:
      - "${KAFKA_PORT_1:-9094}:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:29092,EXTERNAL://${DEPLOY_HOST:-localhost}:${KAFKA_PORT_1:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-AegisKafkaCluster001xyzw}
    volumes:
      - kafka_data_1:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aegis-network

  kafka-2:
    image: apache/kafka:3.9.0
    container_name: aegis-kafka-2
    hostname: kafka-2
    ports:
      - "${KAFKA_PORT_2:-9095}:9094"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:29092,EXTERNAL://${DEPLOY_HOST:-localhost}:${KAFKA_PORT_2:-9095}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-AegisKafkaCluster001xyzw}
    volumes:
      - kafka_data_2:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aegis-network

  kafka-3:
    image: apache/kafka:3.9.0
    container_name: aegis-kafka-3
    hostname: kafka-3
    ports:
      - "${KAFKA_PORT_3:-9096}:9094"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-3:29092,EXTERNAL://${DEPLOY_HOST:-localhost}:${KAFKA_PORT_3:-9096}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-AegisKafkaCluster001xyzw}
    volumes:
      - kafka_data_3:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aegis-network

  # ============================================
  # Kafka UI (Kafdrop) - Message Visualization
  # ============================================
  kafka-ui:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: aegis-kafka-ui
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka-1:29092,kafka-2:29092,kafka-3:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # Spring Boot Banking Backend (BE)
  # ============================================
  be-backend:
    build:
      context: ../BE
      dockerfile: Dockerfile
    container_name: aegis-be-backend
    ports:
      - "${BE_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-aegis}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1}
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      JWT_SECRET: ${JWT_SECRET:-9a65a3d7ebe40f1a9aefefefae2a11b98a3e7456d98124ef1240e94abef87ea9}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      AEGIS_SECURITY_SYNC_TOKEN: ${AEGIS_SECURITY_SYNC_TOKEN:-aegis-secret-security-sync-token-2026}
      LOGGING_FILE_NAME: /var/log/bank/application.log
    volumes:
      - shared_logs:/var/log/bank
    depends_on:
      postgres:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # Next.js Web Portal Frontend (FE_Web)
  # ============================================
  fe-web:
    build:
      context: ../FE_Web
      dockerfile: Dockerfile
    container_name: aegis-fe-web
    ports:
      - "${FE_PORT:-3000}:3000"
    depends_on:
      - be-backend
    networks:
      - aegis-network

  # ============================================
  # Go SOC Backend (dashboard/backend)
  # ============================================
  dashboard-backend:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: aegis-dashboard-backend
    ports:
      - "${DASHBOARD_API_PORT:-8082}:8082"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1}@postgres:5432/${POSTGRES_DB:-aegis}?sslmode=disable
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # SOC Dashboard React/Vite Frontend (dashboard/frontend)
  # ============================================
  dashboard-frontend:
    build:
      context: ../dashboard/frontend
      dockerfile: Dockerfile
    container_name: aegis-dashboard-frontend
    ports:
      - "${DASHBOARD_FE_PORT:-3001}:3001"
    depends_on:
      - dashboard-backend
    networks:
      - aegis-network

  # ============================================
  # Nginx API Gateway & Reverse Proxy (Entrypoint)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: aegis-nginx-gateway
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - shared_logs:/var/log/nginx
    depends_on:
      - fe-web
      - be-backend
      - dashboard-backend
      - dashboard-frontend
    networks:
      - aegis-network

  # ============================================
  # Fluent Bit Log Aggregator
  # ============================================
  fluent-bit:
    image: fluent/fluent-bit:3.0
    container_name: aegis-fluent-bit
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./fluent-bit/filter_threats.lua:/fluent-bit/etc/filter_threats.lua:ro
      - shared_logs:/var/log/shared
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # Python Log Parser (L1 Pipeline)
  # ============================================
  log-parser:
    build:
      context: ./log-parser
      dockerfile: Dockerfile
    container_name: aegis-log-parser
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-aegis-raw-logs-compliance}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      LOCAL_RAW_LOG_DIR: /app/raw-logs
      # Redis for threshold state management
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      # SOAR Fast-Path topic for obvious attacks
      SOAR_FAST_PATH_TOPIC: soar.actions.fast-path
      # Qwen 3 Plus LLM Security Agent
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_MODEL_NAME: ${QWEN_MODEL_NAME:-qwen3-plus}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
    volumes:
      - ./backups/raw-logs:/app/raw-logs
    depends_on:
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # ============================================
  # Aegis SOAR Orchestrator Microservice (Qwen 3.7 Plus Agent)
  # ============================================
  soar-orchestrator:
    build:
      context: ../soar-engine
      dockerfile: Dockerfile
    container_name: aegis-soar-orchestrator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1}@postgres:5432/${POSTGRES_DB:-aegis}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_API_URL: http://dashboard-backend:8082/api
      AEGIS_INTERNAL_TOKEN: aegis-secret-security-sync-token-2026
      # Qwen LLM Settings
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_MODEL_NAME: ${QWEN_MODEL_NAME:-qwen3-plus}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_TIMEOUT_SECONDS: 10
      # SOC autopilot configuration
      SOC_AUTOPILOT_ENABLED: "true"
      # Offline L2 Prompt / Playbooks Directory
      AGENT_L2_DIR: /app/agent-layer-2
      # Vault Configuration
      VAULT_ENABLED: "true"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "aegis-vault-root-token"
      VAULT_SECRET_PATH: "secret/data/aegis/soar"
      # OPA Configuration
      OPA_ENABLED: "true"
      OPA_URL: "http://opa:8181"
      # Asset Inventory Configuration
      ASSET_INVENTORY_API_URL: "http://asset-inventory:8083/api/v1/assets/critical"
    volumes:
      - ../agent-layer-2:/app/agent-layer-2:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dashboard-backend:
        condition: service_started
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      opa:
        condition: service_started
    networks:
      - aegis-network

  # ============================================
  # Aegis SOAR Action Execution & Rate-Limiting Microservice (Message Queue Worker)
  # ============================================
  soar-action-worker:
    build:
      context: ../soar-engine
      dockerfile: Dockerfile
    container_name: aegis-soar-action-worker
    command: ["python", "action_worker.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_API_URL: http://dashboard-backend:8082/api
      AEGIS_INTERNAL_TOKEN: aegis-secret-security-sync-token-2026
      ACTION_EXECUTION_DELAY_SECONDS: "2.0"
      # Vault Configuration
      VAULT_ENABLED: "true"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "aegis-vault-root-token"
      VAULT_SECRET_PATH: "secret/data/aegis/soar"
      # OPA Configuration
      OPA_ENABLED: "true"
      OPA_URL: "http://opa:8181"
      # Asset Inventory Configuration
      ASSET_INVENTORY_API_URL: "http://asset-inventory:8083/api/v1/assets/critical"
    depends_on:
      redis:
        condition: service_healthy
      dashboard-backend:
        condition: service_started
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      opa:
        condition: service_started
    networks:
      - aegis-network

  # ============================================
  # HashiCorp Vault (Secure Credential Storage)
  # ============================================
  vault:
    image: hashicorp/vault:1.15
    container_name: aegis-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "aegis-vault-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - aegis-network

  # ============================================
  # Vault Secret Provisioner (One-shot)
  # ============================================
  vault-init:
    image: curlimages/curl:latest
    container_name: aegis-vault-init
    command: >
      sh -c "
      until curl -s http://vault:8200/v1/sys/health | grep -q '\"initialized\":true'; do
        echo 'Waiting for Vault...';
        sleep 2;
      done;
      echo 'Vault is ready. Provisioning secrets...';
      curl -s --header 'X-Vault-Token: aegis-vault-root-token' \
        --request POST \
        --data '{\"data\": {\"FORTINET_API_TOKEN\": \"mock-fortinet-token-123456\", \"CROWDSTRIKE_CLIENT_SECRET\": \"mock-crowdstrike-client-secret\", \"ENTRA_CLIENT_SECRET\": \"mock-client-secret\", \"AD_LDAP_PASSWORD\": \"mock-ldap-password\", \"AWS_SECRET_ACCESS_KEY\": \"mock-aws-secret\"}}' \
        http://vault:8200/v1/secret/data/aegis/soar;
      echo 'Secrets provisioned successfully.';
      "
    depends_on:
      - vault
    networks:
      - aegis-network

  # ============================================
  # Open Policy Agent (OPA Safety Engine)
  # ============================================
  opa:
    image: openpolicyagent/opa:0.61.0-static
    container_name: aegis-opa
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--log-level=info"
      - "/policies/soar.rego"
    volumes:
      - ./opa/policies:/policies:ro
    networks:
      - aegis-network

  # ============================================
  # Kafka Topic Provisioner (One-shot)
  # ============================================
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: aegis-kafka-init
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: [ "/bin/bash", "-c", "/scripts/init-kafka-topics.sh" ]
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # Staging Sandbox Simulator (Defensive API Mocks)
  # ============================================
  staging-sandbox:
    build:
      context: ./staging-sandbox
      dockerfile: Dockerfile
    container_name: aegis-staging-sandbox
    ports:
      - "8095:8095"
    environment:
      - SANDBOX_PORT=8095
    networks:
      - aegis-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data_1:
    driver: local
  kafka_data_2:
    driver: local
  kafka_data_3:
    driver: local
  shared_logs:

networks:
  aegis-network:
    driver: bridge
