services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aegis-network

  # ============================================
  # Apache Kafka (KRaft Mode - Official Image)
  # ============================================
  kafka:
    image: apache/kafka:3.9.0
    container_name: aegis-kafka
    hostname: kafka
    ports:
      - "${KAFKA_PORT:-9094}:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://${DEPLOY_HOST:-localhost}:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-AegisKafkaCluster001xyzw}
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aegis-network

  # ============================================
  # Kafka UI (Kafdrop) - Message Visualization
  # ============================================
  kafka-ui:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: aegis-kafka-ui
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # Spring Boot Banking Backend (BE)
  # ============================================
  be-backend:
    build:
      context: ../BE
      dockerfile: Dockerfile
    container_name: aegis-be-backend
    ports:
      - "${BE_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-aegis}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-9a65a3d7ebe40f1a9aefefefae2a11b98a3e7456d98124ef1240e94abef87ea9}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      AEGIS_SECURITY_SYNC_TOKEN: ${AEGIS_SECURITY_SYNC_TOKEN:-aegis-secret-security-sync-token-2026}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # Next.js Web Portal Frontend (FE_Web)
  # ============================================
  fe-web:
    build:
      context: ../FE_Web
      dockerfile: Dockerfile
    container_name: aegis-fe-web
    ports:
      - "${FE_PORT:-3000}:3000"
    depends_on:
      - be-backend
    networks:
      - aegis-network

  # ============================================
  # Go SOC Backend (dashboard/backend)
  # ============================================
  dashboard-backend:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: aegis-dashboard-backend
    ports:
      - "${DASHBOARD_API_PORT:-8082}:8082"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1}@postgres:5432/${POSTGRES_DB:-aegis}?sslmode=disable
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # SOC Dashboard React/Vite Frontend (dashboard/frontend)
  # ============================================
  dashboard-frontend:
    build:
      context: ../dashboard/frontend
      dockerfile: Dockerfile
    container_name: aegis-dashboard-frontend
    ports:
      - "${DASHBOARD_FE_PORT:-3001}:3001"
    depends_on:
      - dashboard-backend
    networks:
      - aegis-network

  # ============================================
  # Nginx API Gateway & Reverse Proxy (Entrypoint)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: aegis-nginx-gateway
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fe-web
      - be-backend
      - dashboard-backend
      - dashboard-frontend
    networks:
      - aegis-network

volumes:
  postgres_data:
    driver: local
  kafka_data:
    driver: local

networks:
  aegis-network:
    driver: bridge
