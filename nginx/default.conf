limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;
limit_req_status 429;

server {
    listen 80;
    listen [::]:80;
    server_name localhost 127.0.0.1;

    server_tokens off;

    # Global Security Headers
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; frame-ancestors 'none';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always; # Disabled for HTTP localhost
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), usb=(), payment=()" always;

    # Prevent duplicate CSP headers by hiding backend-supplied ones (LOW-001 fix)
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header X-Powered-By;

    # Configure access and error logs to file for Fluent Bit collection
    access_log /var/log/nginx/aegis_access.log;
    error_log /var/log/nginx/aegis_error.log warn;

    # Gateway-level IP ban enforcement before any upstream application is reached.
    auth_request /_aegis_ip_ban_check;
    error_page 401 403 = @aegis_ip_banned;

    # Maximum file upload size
    client_max_body_size 10M;

    location = /_aegis_ip_ban_check {
        internal;
        auth_request off;
        proxy_pass http://dashboard-backend:8082/api/internal/ip-ban/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /banned {
        auth_request off;
        proxy_pass http://fe-web:3000/banned;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Allow Next.js static assets to load even when IP is banned (needed for /banned page styling)
    location /_next/static/ {
        auth_request off;
        proxy_pass http://fe-web:3000/_next/static/;
        proxy_set_header Host $host;
    }

    location /images/ {
        auth_request off;
        proxy_pass http://fe-web:3000/images/;
        proxy_set_header Host $host;
    }

    location @aegis_ip_banned {
        auth_request off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Aegis-IP-Banned "true" always;

        if ($http_accept ~* "text/html") {
            return 302 /banned;
        }

        default_type application/json;
        return 403 '{"error":"Forbidden: your IP is banned by Aegis","redirect":"/banned"}';
    }

    # Block Tomcat Manager and Host Manager to prevent information disclosure / scanning (MEDIUM-005 fix)
    location ~* /(manager|host-manager) {
        return 404;
    }

    # 1. Next.js Web Portal (FE_Web)
    location / {
        proxy_pass http://fe-web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Security headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate Limiting on Authentication Endpoints (MEDIUM-003 fix)
    location /api-bank/api/auth/ {
        limit_req zone=login_limit burst=30 nodelay;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; frame-ancestors 'none';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), usb=(), payment=()" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        proxy_pass http://be-backend:8080/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        auth_request off;
        limit_req zone=login_limit burst=30 nodelay;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; frame-ancestors 'none';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), usb=(), payment=()" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        proxy_pass http://dashboard-backend:8082/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Banking Spring Boot REST API (BE)
    # The trailing slash on proxy_pass strips the '/api-bank' prefix.
    # e.g., /api-bank/api/auth/login -> http://be-backend:8080/api/auth/login
    location /api-bank/ {
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; frame-ancestors 'none';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), usb=(), payment=()" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        proxy_pass http://be-backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. SOC Go Backend API (dashboard/backend) - Exempt from gateway IP ban check for SOC operators
    location /api/ {
        auth_request off;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; frame-ancestors 'none';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), usb=(), payment=()" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        proxy_pass http://dashboard-backend:8082/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. SOC Dashboard React Frontend (dashboard/frontend)
    location /soc/ {
        auth_request off;
        proxy_pass http://dashboard-frontend:3001/soc/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 9000;
    server_name localhost;

    server_tokens off;

    # Apply the same gateway IP ban to the Kafdrop console.
    auth_request /_aegis_ip_ban_check;
    error_page 401 403 = @aegis_ip_banned;

    location = /_aegis_ip_ban_check {
        internal;
        auth_request off;
        proxy_pass http://dashboard-backend:8082/api/internal/ip-ban/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @aegis_ip_banned {
        auth_request off;
        default_type text/html;
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Aegis-IP-Banned "true" always;
        return 403 '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>403 Access Revoked | Aegis Security</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#080b12;color:#f8fafc;font-family:Inter,system-ui,sans-serif;padding:24px;}.container{width:100%;max-width:580px;background:#111827;border:1px solid rgba(244,63,94,0.4);padding:40px;box-shadow:0 25px 60px -15px rgba(0,0,0,0.7),0 0 40px rgba(244,63,94,0.15);position:relative;overflow:hidden;}.container::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#f43f5e,#e11d48);}.badge{font-size:11px;font-family:"JetBrains Mono",monospace;font-weight:700;color:#fda4af;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:16px;display:inline-flex;align-items:center;gap:8px;background:rgba(244,63,94,0.12);padding:6px 12px;border:1px solid rgba(244,63,94,0.25);border-radius:2px;}.title{font-size:32px;font-weight:800;letter-spacing:-0.02em;margin:0 0 16px;color:#ffffff;}.description{font-size:14px;line-height:1.6;color:#94a3b8;margin:0 0 24px;}.info-box{background:rgba(15,23,42,0.8);border:1px solid rgba(244,63,94,0.25);padding:18px;font-size:13px;color:#cbd5e1;border-radius:4px;font-family:"JetBrains Mono",monospace;}.info-row{display:flex;justify-content:space-between;margin-bottom:8px;}.info-row:last-child{margin-bottom:0;}.label{color:#64748b;}.val-banned{color:#f43f5e;font-weight:700;}.footer{margin-top:28px;font-size:12px;color:#475569;text-align:center;font-family:"JetBrains Mono",monospace;}</style></head><body><div class="container"><div class="badge">🛡️ 403 IP_BANNED</div><h1 class="title">Access Revoked</h1><p class="description">Your IP address has been blocked by the <strong>Aegis AI Autopilot Security Policy</strong>. All active browser sessions, tokens, and gateway connections from this IP have been revoked.</p><div class="info-box"><div class="info-row"><span class="label">STATUS:</span><span class="val-banned">403 FORBIDDEN</span></div><div class="info-row"><span class="label">ENFORCEMENT:</span><span>NGINX GATEWAY / WAF EDGE</span></div><div class="info-row"><span class="label">ACTION:</span><span>IP BLOCKLISTED</span></div></div><div class="footer">AEGIS BANK CYBER DEFENSE ECOSYSTEM • SOC AUTOPILOT</div></div></body></html>';
    }

    # Basic Auth to secure ALL Kafdrop pages/APIs including message viewers (K-02 fix)
    location / {
        auth_basic "Secure Kafdrop Console";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://kafka-ui:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
