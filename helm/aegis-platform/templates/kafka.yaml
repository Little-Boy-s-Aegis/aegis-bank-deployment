{{- if eq .Values.environment "local" }}
apiVersion: v1
kind: Service
metadata:
  name: kafka-hl
  labels:
    app: kafka
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
    - port: 29092
      name: internal
    - port: 9093
      name: controller
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-1
spec:
  selector:
    statefulset.kubernetes.io/pod-name: kafka-0
  ports:
    - port: 29092
      targetPort: 29092
      name: internal
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-2
spec:
  selector:
    statefulset.kubernetes.io/pod-name: kafka-1
  ports:
    - port: 29092
      targetPort: 29092
      name: internal
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-3
spec:
  selector:
    statefulset.kubernetes.io/pod-name: kafka-2
  ports:
    - port: 29092
      targetPort: 29092
      name: internal
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
spec:
  serviceName: kafka-hl
  replicas: 3
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          env:
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "0@kafka-0.kafka-hl:9093,1@kafka-1.kafka-hl:9093,2@kafka-2.kafka-hl:9093"
            - name: KAFKA_LISTENERS
              value: INTERNAL://:29092,CONTROLLER://:9093
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: INTERNAL
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "2"
            - name: CLUSTER_ID
              value: "AegisKafkaCluster001xyzw"
          command:
            - "/bin/bash"
            - "-c"
            - |
              POD_INDEX=$(echo $HOSTNAME | awk -F'-' '{print $NF}')
              export KAFKA_NODE_ID=$POD_INDEX
              export KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-$POD_INDEX.kafka-hl:29092
              echo "Starting Kafka node $KAFKA_NODE_ID with listeners $KAFKA_ADVERTISED_LISTENERS..."
              exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/kraft/server.properties \
                --override process.roles=$KAFKA_PROCESS_ROLES \
                --override node.id=$KAFKA_NODE_ID \
                --override controller.quorum.voters=$KAFKA_CONTROLLER_QUORUM_VOTERS \
                --override listeners=$KAFKA_LISTENERS \
                --override listener.security.protocol.map=$KAFKA_LISTENER_SECURITY_PROTOCOL_MAP \
                --override advertised.listeners=$KAFKA_ADVERTISED_LISTENERS \
                --override inter.broker.listener.name=$KAFKA_INTER_BROKER_LISTENER_NAME \
                --override controller.listener.names=$KAFKA_CONTROLLER_LISTENER_NAMES \
                --override auto.create.topics.enable=$KAFKA_AUTO_CREATE_TOPICS_ENABLE \
                --override num.partitions=$KAFKA_NUM_PARTITIONS \
                --override default.replication.factor=$KAFKA_DEFAULT_REPLICATION_FACTOR \
                --override min.insync.replicas=$KAFKA_MIN_INSYNC_REPLICAS \
                --override log.dirs=/var/lib/kafka/data
          ports:
            - containerPort: 29092
              name: internal
            - containerPort: 9093
              name: controller
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 2Gi
{{- end }}
