  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.0
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc
            - name: shared-logs
              mountPath: /var/log/shared
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: shared-logs
