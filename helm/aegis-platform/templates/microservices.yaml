apiVersion: apps/v1
kind: Deployment
metadata:
  name: soar-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soar-orchestrator
  template:
    metadata:
      labels:
        app: soar-orchestrator
    spec:
      containers:
        - name: soar-orchestrator
          image: {{ .Values.soarEngine.image }}
          imagePullPolicy: {{ .Values.soarEngine.imagePullPolicy }}
          env:
            {{- if eq .Values.environment "aws" }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.aws.mskBrokers | quote }}
            - name: DATABASE_URL
              value: "postgres://postgres:$(POSTGRES_PASSWORD)@{{ .Values.aws.rdsEndpoint }}:5432/{{ .Values.aws.postgresDb }}?sslmode=require"
            - name: REDIS_URL
              value: "redis://{{ .Values.aws.elasticacheEndpoint }}:6379/0"
            {{- else }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
            - name: DATABASE_URL
              value: "postgres://postgres:$(POSTGRES_PASSWORD)@postgres:5432/aegis?sslmode=disable"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: postgres-password
            - name: DASHBOARD_API_URL
              value: "http://dashboard-backend:8082/api"
            - name: AEGIS_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: aegis-security-sync-token
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: dashscope-api-key
            - name: QWEN_MODEL_NAME
              value: "qwen3-plus"
            - name: LLM_ENABLED
              value: "true"
            - name: LLM_TIMEOUT_SECONDS
              value: "10"
            - name: SOC_AUTOPILOT_ENABLED
              value: {{ .Values.soarEngine.autopilotEnabled | quote }}
            - name: FORTINET_BASE_URL
              value: "http://staging-sandbox:8095/api/v2"
            - name: AGENT_L2_DIR
              value: "/app/agent-layer-2"
            - name: VAULT_ENABLED
              value: "true"
            - name: VAULT_ADDR
              value: "http://vault:8200"
            - name: VAULT_TOKEN
              value: {{ .Values.vault.rootToken | quote }}
            - name: OPA_ENABLED
              value: "true"
            - name: OPA_URL
              value: "http://opa:8181"
            - name: HA_NODE_ROLE
              value: "active"
            - name: HA_HEALTH_CHECK_INTERVAL_MS
              value: "5000"
            - name: HA_LEADERSHIP_TTL_S
              value: "15"
            - name: SCHEDULER_ENABLED
              value: "true"
            - name: PREKILL_ENABLED
              value: "true"
          volumeMounts:
            - name: l2-volume
              mountPath: /app/agent-layer-2
      volumes:
        - name: l2-volume
          configMap:
            name: aegis-l2-config
---
