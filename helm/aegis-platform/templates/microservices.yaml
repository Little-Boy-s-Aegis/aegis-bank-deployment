apiVersion: v1
kind: Service
metadata:
  name: be-backend
spec:
  selector:
    app: be-backend
  ports:
    - port: {{ .Values.beBackend.port }}
      targetPort: {{ .Values.beBackend.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: be-backend
spec:
  replicas: {{ .Values.beBackend.replicaCount }}
  selector:
    matchLabels:
      app: be-backend
  template:
    metadata:
      labels:
        app: be-backend
    spec:
      containers:
        - name: be-backend
          image: {{ .Values.beBackend.image }}
          imagePullPolicy: {{ .Values.beBackend.imagePullPolicy }}
          env:
            {{- if eq .Values.environment "aws" }}
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Values.aws.rdsEndpoint }}:5432/{{ .Values.aws.postgresDb }}"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.aws.mskBrokers | quote }}
            {{- else }}
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/aegis"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
            {{- end }}
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: postgres-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: jwt-secret
            - name: JWT_EXPIRATION
              value: "86400000"
            - name: AEGIS_SECURITY_SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: aegis-security-sync-token
            - name: LOGGING_FILE_NAME
              value: "/var/log/bank/application.log"
          ports:
            - containerPort: {{ .Values.beBackend.port }}
          volumeMounts:
            - name: shared-logs
              mountPath: /var/log/bank
      volumes:
        - name: shared-logs
          emptyDir: {}
---
