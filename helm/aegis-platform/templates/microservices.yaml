---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  {{- if eq .Values.environment "aws" }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: tcp
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
  {{- end }}
spec:
  type: {{ .Values.gateway.type }}
  selector:
    app: nginx-gateway
  ports:
    - port: 80
      targetPort: 80
      {{- if and (eq .Values.gateway.type "NodePort") .Values.gateway.nodePort }}
      nodePort: {{ .Values.gateway.nodePort }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
        - name: nginx-gateway
          image: nginx:alpine
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: htpasswd
              mountPath: /etc/nginx/.htpasswd
              subPath: .htpasswd
          ports:
            - containerPort: 80
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-gateway-config
        - name: htpasswd
          secret:
            secretName: aegis-secrets
            items:
              - key: htpasswd
                path: .htpasswd
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
spec:
  selector:
    app: kafka-ui
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: obsidiandynamics/kafdrop:4.0.2
          env:
            {{- if eq .Values.environment "aws" }}
            - name: KAFKA_BROKERCONNECT
              value: {{ .Values.aws.mskBrokers | quote }}
            {{- else }}
            - name: KAFKA_BROKERCONNECT
              value: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
            {{- end }}
            - name: JVM_OPTS
              value: "-Xms32M -Xmx64M"
          ports:
            - containerPort: 9000
