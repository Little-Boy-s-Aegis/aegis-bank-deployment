    - port: 8095
      targetPort: 8095
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: staging-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: staging-sandbox
  template:
    metadata:
      labels:
        app: staging-sandbox
    spec:
      containers:
        - name: staging-sandbox
          image: aegis-bank-deployment-staging-sandbox:latest
          imagePullPolicy: Never
          env:
            - name: SANDBOX_PORT
              value: "8095"
            - name: AEGIS_SECURITY_SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: aegis-security-sync-token
            - name: FORTINET_API_TOKEN
              value: "aegis-fortinet-token-123456"
            - name: CROWDSTRIKE_CLIENT_SECRET
              value: "mock-crowdstrike-client-secret"
            - name: ENTRA_CLIENT_SECRET
              value: "mock-client-secret"
          ports:
            - containerPort: 8095
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-parser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-parser
  template:
    metadata:
      labels:
        app: log-parser
    spec:
      containers:
        - name: log-parser
          image: aegis-bank-deployment-log-parser:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: REDIS_ENABLED
              value: "true"
            - name: SOAR_FAST_PATH_TOPIC
              value: "soar.actions.fast-path"
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: dashscope-api-key
            - name: QWEN_MODEL_NAME
              value: "qwen3-plus"
            - name: LLM_ENABLED
              value: "true"
            - name: LLM_TIMEOUT_SECONDS
              value: "30"
            - name: QDRANT_URL
              value: "http://qdrant:6333"
          volumeMounts:
            - name: agent-layer-1
              mountPath: /app/agent-layer-1
              readOnly: true
      volumes:
        - name: agent-layer-1
          hostPath:
            path: /run/desktop/mnt/host/d/hackathon/agent-layer-1
            type: Directory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluent-bit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.0
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
          ports:
            - containerPort: 2020
              name: http-metrics
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc
            - name: shared-logs
              mountPath: /var/log/shared
            - name: fluent-bit-state
              mountPath: /var/lib/fluent-bit
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http-metrics
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http-metrics
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: shared-logs
          persistentVolumeClaim:
            claimName: shared-logs
        - name: fluent-bit-state
          persistentVolumeClaim:
            claimName: fluent-bit-state
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
spec:
  type: NodePort
  selector:
    app: nginx-gateway
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
        - name: nginx-gateway
          image: nginx:alpine
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: htpasswd
              mountPath: /etc/nginx/.htpasswd
              subPath: .htpasswd
            - name: shared-logs
              mountPath: /var/log/nginx
          ports:
            - containerPort: 80
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-gateway-config
        - name: htpasswd
          secret:
            secretName: aegis-secrets
            items:
              - key: htpasswd
                path: .htpasswd
        - name: shared-logs
          persistentVolumeClaim:
            claimName: shared-logs
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
spec:
  selector:
    app: kafka-ui
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: obsidiandynamics/kafdrop:4.0.2
          env:
            - name: KAFKA_BROKERCONNECT
              value: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
            - name: JVM_OPTS
              value: "-Xms32M -Xmx64M"
          ports:
            - containerPort: 9000
