apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-logs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fluent-bit-state
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: be-backend
spec:
  selector:
    app: be-backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: be-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: be-backend
  template:
    metadata:
      labels:
        app: be-backend
    spec:
      containers:
        - name: be-backend
          image: aegis-bank-deployment-be-backend:latest
          imagePullPolicy: Never
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/aegis"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: postgres-password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: jwt-secret
            - name: JWT_EXPIRATION
              value: "86400000"
            - name: AEGIS_SECURITY_SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: aegis-security-sync-token
            - name: LOGGING_FILE_NAME
              value: "/var/log/bank/application.log"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: shared-logs
              mountPath: /var/log/bank
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: shared-logs
          persistentVolumeClaim:
            claimName: shared-logs
---
