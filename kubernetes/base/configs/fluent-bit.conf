[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Health_Check On
    storage.path              /var/lib/fluent-bit/storage
    storage.sync              normal
    storage.checksum          off
    storage.backlog.mem_limit 10M

[INPUT]
    Name             tail
    Path             /var/log/shared/aegis_access.log
    Tag              nginx.access
    Parser           nginx
    DB               /var/lib/fluent-bit/nginx-access.db
    Refresh_Interval 2
    Rotate_Wait      30
    Mem_Buf_Limit    10MB
    Skip_Long_Lines  On
    Read_from_Head   True
    storage.type     filesystem

[INPUT]
    Name             tail
    Path             /var/log/shared/aegis_error.log
    Tag              nginx.error
    Parser           nginx_error
    DB               /var/lib/fluent-bit/nginx-error.db
    Refresh_Interval 2
    Rotate_Wait      30
    Mem_Buf_Limit    10MB
    Skip_Long_Lines  On
    Read_from_Head   True
    storage.type     filesystem

[INPUT]
    Name             tail
    Path             /var/log/shared/application.log
    Tag              be.backend
    DB               /var/lib/fluent-bit/be-backend.db
    Refresh_Interval 2
    Rotate_Wait      30
    Mem_Buf_Limit    10MB
    Skip_Long_Lines  On
    Read_from_Head   True
    storage.type     filesystem

# ============================================
# Threat Detection Filters
# ============================================
[FILTER]
    Name    lua
    Match   nginx.access
    Script  filter_threats.lua
    Call    detect_threats

[FILTER]
    Name    lua
    Match   be.backend
    Script  filter_threats.lua
    Call    detect_threats

# Clones threat records to a new tag 'threat.alert'
[FILTER]
    Name          rewrite_tag
    Match         nginx.access
    Rule          $threat_detected ^true$ threat.alert true
    Emitter_Storage.type filesystem

[FILTER]
    Name          rewrite_tag
    Match         be.backend
    Rule          $threat_detected ^true$ threat.alert true
    Emitter_Storage.type filesystem

# ============================================
# Outputs
# ============================================
[OUTPUT]
    Name            stdout
    Match           *
    Format          json_lines

[OUTPUT]
    Name            kafka
    Match           nginx.access
    Brokers         ${KAFKA_BOOTSTRAP_SERVERS}
    Topics          l0.input.apigw
    Format          json
    Timestamp_Key   @timestamp
    Retry_Limit     False

[OUTPUT]
    Name            kafka
    Match           nginx.error
    Brokers         ${KAFKA_BOOTSTRAP_SERVERS}
    Topics          l0.input.waf
    Format          json
    Timestamp_Key   @timestamp
    Retry_Limit     False

[OUTPUT]
    Name            kafka
    Match           be.backend
    Brokers         ${KAFKA_BOOTSTRAP_SERVERS}
    Topics          l0.input.ebanking-app
    Format          json
    Timestamp_Key   @timestamp
    Retry_Limit     False

# Streams cloned threat alert records directly to the main Security Events topic
[OUTPUT]
    Name            kafka
    Match           threat.alert
    Brokers         ${KAFKA_BOOTSTRAP_SERVERS}
    Topics          aegis.security.events
    Format          json
    Timestamp_Key   @timestamp
    Retry_Limit     False
