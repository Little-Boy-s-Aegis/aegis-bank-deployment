apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
metadata:
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: tcp
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - port: 80
      targetPort: 80
      nodePort: null
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: be-backend
spec:
  template:
    spec:
      containers:
        - name: be-backend
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(AWS_RDS_ENDPOINT):5432/aegis"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "$(AWS_MSK_BROKERS)"
          # Inject AWS configuration values
          envFrom:
            - configMapRef:
                name: aws-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
spec:
  template:
    spec:
      containers:
        - name: dashboard-backend
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:$(POSTGRES_PASSWORD)@$(AWS_RDS_ENDPOINT):5432/aegis?sslmode=require"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "$(AWS_MSK_BROKERS)"
          envFrom:
            - configMapRef:
                name: aws-config
---
