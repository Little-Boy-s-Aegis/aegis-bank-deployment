name: Track Git Clones

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  track-clones:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run tracking script
        env:
          CLONES_TOKEN: ${{ secrets.CLONES_TOKEN }}
        run: |
          python -c '
          import os
          import json
          import urllib.request
          from datetime import datetime

          token = os.environ.get("CLONES_TOKEN")
          github_repo = os.environ.get("GITHUB_REPOSITORY")

          if not token:
              print("Warning: CLONES_TOKEN is not set. Please create a Personal Access Token with repo scope and add it as a secret named CLONES_TOKEN in your repository settings.")
              exit(0)

          owner = github_repo.split("/")[0]

          gh_headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json",
              "User-Agent": "Github-Stats-Tracker"
          }

          # Fetch 14-day exact clones and unique cloners for the main repository only
          print(f"Fetching live 14-day traffic for {owner}/aegis-bank-deployment...")
          clones_url = f"https://api.github.com/repos/{owner}/aegis-bank-deployment/traffic/clones"
          req = urllib.request.Request(clones_url, headers=gh_headers)
          try:
              with urllib.request.urlopen(req) as r:
                  clones_data = json.loads(r.read().decode())
          except Exception as e:
              print(f"Error fetching clones: {e}")
              clones_data = {}

          # Extract raw de-duplicated 14-day totals directly from GitHub API
          grand_clones = clones_data.get("count", 0)
          grand_uniques = clones_data.get("uniques", 0)

          # Fetch release downloads for the main repo
          print(f"Fetching release stats for {owner}/aegis-bank-deployment...")
          releases_url = f"https://api.github.com/repos/{owner}/aegis-bank-deployment/releases"
          req = urllib.request.Request(releases_url, headers=gh_headers)
          try:
              with urllib.request.urlopen(req) as r:
                  releases_data = json.loads(r.read().decode())
          except Exception as e:
              print(f"Error fetching releases: {e}")
              releases_data = []

          downloads_total = 0
          if isinstance(releases_data, list):
              for release in releases_data:
                  for asset in release.get("assets", []):
                      downloads_total += asset.get("download_count", 0)

          # Fetch Docker Hub pulls for namespace voduchieu1
          docker_user = "voduchieu1"
          docker_pulls = 0
          print(f"Fetching Docker Hub stats for namespace {docker_user}...")
          docker_url = f"https://hub.docker.com/v2/repositories/{docker_user}/?page_size=100"
          req = urllib.request.Request(docker_url, headers={"User-Agent": "Docker-Pulls-Tracker"})
          try:
              with urllib.request.urlopen(req) as r:
                  docker_data = json.loads(r.read().decode())
                  for result in docker_data.get("results", []):
                      docker_pulls += result.get("pull_count", 0)
          except Exception as e:
              print(f"Error fetching Docker pulls: {e}")
              docker_pulls = 0

          # Write dynamic badge endpoints
          with open("clone-badge.json", "w", encoding="utf-8") as f:
              json.dump({
                  "schemaVersion": 1,
                  "label": "clones (14d)",
                  "message": f"{grand_clones}",
                  "color": "22C55E"
              }, f, indent=2)

          with open("uniques-badge.json", "w", encoding="utf-8") as f:
              json.dump({
                  "schemaVersion": 1,
                  "label": "cloners (14d)",
                  "message": f"{grand_uniques}",
                  "color": "E11D48"
              }, f, indent=2)

          with open("downloads-badge.json", "w", encoding="utf-8") as f:
              json.dump({
                  "schemaVersion": 1,
                  "label": "downloads",
                  "message": f"{downloads_total} total",
                  "color": "3B82F6"
              }, f, indent=2)

          with open("docker-badge.json", "w", encoding="utf-8") as f:
              json.dump({
                  "schemaVersion": 1,
                  "label": "docker pulls",
                  "message": f"{docker_pulls} total",
                  "color": "0984e3"
              }, f, indent=2)

          # Save database with current snapshot
          history = {
              "docker_hub_username": docker_user,
              "docker_cumulative_pulls": docker_pulls,
              "release_cumulative_downloads": downloads_total,
              "main_repo_14d_clones": grand_clones,
              "main_repo_14d_uniques": grand_uniques,
              "last_updated": datetime.utcnow().isoformat() + "Z"
          }
          with open("clone-history.json", "w", encoding="utf-8") as f:
              json.dump(history, f, indent=2)

          print("Done! Stats updated successfully:")
          print(f"- Clones (14 days): {grand_clones}")
          print(f"- Unique Cloners (14 days de-duplicated): {grand_uniques}")
          print(f"- Release Downloads: {downloads_total}")
          print(f"- Docker Pulls: {docker_pulls}")
          '

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add clone-history.json clone-badge.json uniques-badge.json downloads-badge.json docker-badge.json
          git diff-index --quiet HEAD || git commit -m "Update statistics to live 14-day de-duplicated counts [skip ci]"
          git push
