name: Track Git Clones

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  track-clones:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run tracking script
        env:
          CLONES_TOKEN: ${{ secrets.CLONES_TOKEN }}
        run: |
          python -c '
          import os
          import json
          import urllib.request
          from datetime import datetime

          token = os.environ.get("CLONES_TOKEN")
          github_repo = os.environ.get("GITHUB_REPOSITORY")

          if not token:
              print("Warning: CLONES_TOKEN is not set. Please create a Personal Access Token with repo scope and add it as a secret named CLONES_TOKEN in your repository settings.")
              exit(0)

          owner = github_repo.split("/")[0]

          REPOS = [
              "aegis-bank-deployment",
              "aegis-bank-backend",
              "aegis-bank-web-client",
              "aegis-bank-mobile-app",
              "aegis-soar-engine",
              "aegis-staging-sandbox",
              "dashboard",
              "agent-layer-1",
              "agent-layer-2",
              "aegis-bank-terraform"
          ]

          history_file = "clone-history.json"
          if os.path.exists(history_file):
              with open(history_file, "r", encoding="utf-8") as f:
                  history = json.load(f)
          else:
              history = {"repositories": {}, "cumulative_total": 5, "last_updated": ""}

          repos_history = history.setdefault("repositories", {})
          grand_total = 0

          for repo_name in REPOS:
              print(f"Fetching clone stats for {owner}/{repo_name}...")
              url = f"https://api.github.com/repos/{owner}/{repo_name}/traffic/clones"
              req = urllib.request.Request(url)
              req.add_header("Authorization", f"token {token}")
              req.add_header("Accept", "application/vnd.github.v3+json")
              req.add_header("User-Agent", "Github-Clones-Tracker")

              try:
                  with urllib.request.urlopen(req) as response:
                      data = json.loads(response.read().decode())
              except Exception as e:
                  print(f"Error fetching clone stats for {repo_name}: {e}. Using existing history.")
                  data = {}

              repo_record = repos_history.setdefault(repo_name, {"historical_seed": 0, "daily_clones": {}})
              daily_clones = repo_record.setdefault("daily_clones", {})

              for record in data.get("clones", []):
                  timestamp = record.get("timestamp")
                  date_str = timestamp.split("T")[0]
                  count = record.get("count", 0)
                  
                  existing_count = daily_clones.get(date_str, 0)
                  if count > existing_count:
                      daily_clones[date_str] = count

              repo_total = repo_record.get("historical_seed", 0) + sum(daily_clones.values())
              grand_total += repo_total
              print(f"Repo {repo_name} total clones: {repo_total}")

          history["cumulative_total"] = grand_total
          history["last_updated"] = datetime.utcnow().isoformat() + "Z"

          with open(history_file, "w", encoding="utf-8") as f:
              json.dump(history, f, indent=2)

          badge = {
              "schemaVersion": 1,
              "label": "total clones",
              "message": f"{grand_total} total",
              "color": "22C55E"
          }
          with open("clone-badge.json", "w", encoding="utf-8") as f:
              json.dump(badge, f, indent=2)

          print(f"Successfully updated grand total clones count to: {grand_total}")
          '

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add clone-history.json clone-badge.json
          git diff-index --quiet HEAD || git commit -m "Update multi-repo clone statistics [skip ci]"
          git push
